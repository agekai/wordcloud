<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動即時文字雲 (Firebase 即時同步版)</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- WordCloud2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <!-- QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>

    <!-- Firebase SDK (Compat 模式以支援全域 firebase 物件) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-color: #f8fafc;
            transition: background-color .5s ease;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 520px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #cloud-canvas { position: relative; z-index: 2; }
        .interactive-card {
            box-shadow: 0 4px 20px -2px rgba(148,163,184,.12), 0 2px 8px -1px rgba(148,163,184,.08);
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header id="host-header" class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-30 shadow-sm flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-2.5 rounded-xl shadow-lg">
                <i class="fa-solid fa-cloud text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                    即時互動文字雲 <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">Firebase版</span>
                </h1>
                <p class="text-xs text-slate-400">Firebase Realtime Database Interactive Word Cloud</p>
            </div>
        </div>
        <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-50 text-slate-500 text-sm border">
            <span class="h-2 w-2 rounded-full bg-slate-400 animate-pulse"></span>
            <span id="status-text">Firebase初始化中...</span>
        </div>
    </header>

    <!-- Main Host Layout -->
    <main id="host-layout" class="hidden flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl interactive-card border">
                <label class="text-sm font-semibold text-slate-500 flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-heading text-indigo-500"></i> 設定討論題目
                </label>
                <input id="topic-input" value="今天的心情如何？用三個詞形容！" class="w-full text-lg font-bold border-b-2 border-slate-100 focus:border-indigo-500 outline-none pb-1">
            </div>

            <div class="bg-white p-6 rounded-2xl interactive-card border flex flex-col items-center text-center">
                <h3 class="font-bold mb-3"><i class="fa-solid fa-qrcode text-indigo-600"></i> 邀請觀眾加入</h3>
                <p class="text-xs text-slate-400 mb-4">掃描 QR Code 即可輸入想法</p>
                <div class="p-3 border rounded-2xl shadow-inner">
                    <div id="qrcode" class="w-[180px] h-[180px] flex items-center justify-center text-xs text-slate-400">等待產生房間 QR Code</div>
                </div>
                <div class="w-full flex mt-4 bg-slate-50 p-2 rounded-xl">
                    <input id="share-link-input" readonly class="flex-1 bg-transparent text-xs outline-none" value="建立房間中...">
                    <button id="copy-link-btn" class="bg-white px-3 py-1 rounded-lg text-indigo-600 text-xs border"><i class="fa-regular fa-copy"></i> 複製</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl interactive-card border flex-1">
                <div class="flex justify-between mb-3">
                    <h3 class="font-bold text-sm"><i class="fa-solid fa-list text-amber-500"></i> 即時詞彙</h3>
                    <button id="clear-all-btn" class="text-xs text-rose-500">清空</button>
                </div>
                <div id="words-list-container" class="space-y-2 max-h-[250px] overflow-y-auto"></div>
                <div class="mt-4 flex gap-2">
                    <button id="load-sample-btn" class="flex-1 text-xs border rounded-lg p-2 text-indigo-600">載入範例</button>
                    <button id="load-fireshow-btn" class="flex-1 text-xs border rounded-lg p-2 text-orange-600">🔥 火舞範例</button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 flex flex-col gap-6">
            <div class="bg-white p-4 rounded-2xl interactive-card border">
                <span class="px-3 py-1 bg-indigo-500 text-white rounded-lg text-xs">LIVE TOPIC</span>
                <h2 id="live-topic-title" class="font-bold mt-2">載入中...</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl interactive-card border flex-1">
                <div class="flex justify-between mb-3">
                    <div>
                        <button class="theme-badge border px-3 py-1 rounded-full text-xs" data-theme="modern">莫蘭迪</button>
                        <button class="theme-badge border px-3 py-1 rounded-full text-xs" data-theme="fireshow">🔥 火舞</button>
                    </div>
                    <button id="redraw-btn" class="text-xs border px-3 py-1 rounded-lg">重新排版</button>
                </div>
                <div id="canvas-container" class="canvas-container bg-slate-50 rounded-xl overflow-hidden relative">
                    <div id="canvas-placeholder" class="absolute inset-0 flex flex-col justify-center items-center text-slate-400">
                        <i class="fa-solid fa-cloud text-4xl mb-3"></i>
                        <p>等待文字雲資料</p>
                    </div>
                    <canvas id="particle-canvas"></canvas>
                    <canvas id="cloud-canvas"></canvas>
                </div>
                <div class="mt-4 flex gap-3">
                    <button id="lock-btn" class="flex-1 bg-slate-800 text-white rounded-xl p-3"><i class="fa-solid fa-lock-open"></i> 鎖定收集</button>
                    <button id="download-btn" disabled class="flex-1 bg-slate-200 text-slate-400 rounded-xl p-3">下載PNG</button>
                </div>
            </div>
        </section>
    </main>

    <!-- User Input Layout -->
    <main id="user-layout" class="hidden flex-1 max-w-md mx-auto p-5 flex flex-col justify-center">
        <div class="bg-white rounded-3xl shadow-xl border p-6 relative overflow-hidden">
            <div class="mb-4"><span id="user-status-badge" class="text-xs text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">連線中</span></div>
            <h2 id="user-topic" class="text-xl font-bold mb-5">等待題目</h2>
            <textarea id="user-answer-input" rows="4" class="w-full border rounded-2xl p-4 bg-slate-50" placeholder="輸入你的想法"></textarea>
            <button id="user-submit-btn" class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-2xl"><i class="fa-solid fa-paper-plane"></i> 送出答案</button>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast-message" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl opacity-0 translate-y-20 transition">
        <span id="toast-text">訊息</span>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD53pbv-JDyyRhmIN-KO96oA52W8yW11R8",
            authDomain: "wordcloud-e92c3.firebaseapp.com",
            databaseURL: "https://wordcloud-e92c3-default-rtdb.firebaseio.com",
            projectId: "wordcloud-e92c3",
            storageBucket: "wordcloud-e92c3.firebasestorage.app",
            messagingSenderId: "632967485624",
            appId: "1:632967485624:web:c3c75bc63ec6aa3bcbbc4d",
            measurementId: "G-B5ZH5GDHHG"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let role = "host";
        let roomId = null;
        let wordsMap = {};
        let topic = "今天的心情如何？用三個詞形容！";
        let currentTheme = "modern";
        let isLocked = false;

        const palettes = {
            modern: { bg: "#f8fafc", colors: ["#6366f1", "#8b5cf6", "#ec4899", "#06b6d4"] },
            fireshow: { bg: "#140502", colors: ["#ff4500", "#ff8c00", "#ffd700", "#ff3333"] }
        };

        window.onload = () => {
            const params = new URLSearchParams(location.search);
            roomId = params.get("room");

            if (params.get("view") === "input" && roomId) {
                role = "input";
                document.getElementById("user-layout").classList.remove("hidden");
                initClient();
            } else {
                role = "host";
                document.getElementById("host-layout").classList.remove("hidden");
                initHost();
            }
        };

        function initHost() {
            roomId = Math.random().toString(36).substring(2, 10);
            database.ref("rooms/" + roomId).set({
                topic: topic,
                theme: "modern",
                locked: false,
                words: {}
            });

            const url = location.origin + location.pathname + "?view=input&room=" + roomId;
            document.getElementById("share-link-input").value = url;
            new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180 });
            document.getElementById("status-text").innerText = "Firebase房間：" + roomId;

            listenRoom();
            bindHostEvents();
        }

        function listenRoom() {
            database.ref("rooms/" + roomId).on("value", snap => {
                const data = snap.val();
                if (!data) return;
                topic = data.topic || "";
                currentTheme = data.theme || "modern";
                isLocked = data.locked || false;
                wordsMap = data.words || {};
                updateHostUI();
                renderWordsList();
                renderWordCloud();
            });
        }

        function initClient() {
            database.ref("rooms/" + roomId).on("value", snap => {
                const data = snap.val();
                if (!data) {
                    showToast("房間不存在");
                    return;
                }
                topic = data.topic;
                currentTheme = data.theme;
                isLocked = data.locked;
                document.getElementById("user-topic").innerText = topic;
                document.getElementById("user-submit-btn").disabled = isLocked;
            });
            document.getElementById("user-submit-btn").onclick = submitAnswer;
        }

        function submitAnswer() {
            if (isLocked) {
                showToast("活動已結束");
                return;
            }
            const text = document.getElementById("user-answer-input").value.trim();
            if (!text) return;
            const arr = text.split(/[\s,，、]+/).filter(x => x);
            const ref = database.ref("rooms/" + roomId + "/words");
            arr.forEach(word => {
                ref.child(word).transaction(old => (old || 0) + 1);
            });
            document.getElementById("user-answer-input").value = "";
            showToast("答案已送出");
        }

        function bindHostEvents() {
            document.getElementById("topic-input").onchange = e => {
                database.ref("rooms/" + roomId + "/topic").set(e.target.value);
            };
            document.querySelectorAll(".theme-badge").forEach(btn => {
                btn.onclick = () => {
                    database.ref("rooms/" + roomId + "/theme").set(btn.dataset.theme);
                };
            });
            document.getElementById("lock-btn").onclick = () => {
                database.ref("rooms/" + roomId + "/locked").set(!isLocked);
            };
            document.getElementById("clear-all-btn").onclick = () => {
                database.ref("rooms/" + roomId + "/words").set(null);
            };
            document.getElementById("redraw-btn").onclick = renderWordCloud;
            document.getElementById("copy-link-btn").onclick = () => {
                navigator.clipboard.writeText(document.getElementById("share-link-input").value);
                showToast("連結已複製");
            };
        }

        function updateHostUI() {
            document.getElementById("live-topic-title").innerText = topic;
            document.getElementById("topic-input").value = topic;
            const btn = document.getElementById("lock-btn");
            btn.innerHTML = isLocked ? "🔒 已鎖定" : "🔓 鎖定收集";
        }

        function renderWordsList() {
            const box = document.getElementById("words-list-container");
            box.innerHTML = "";
            Object.entries(wordsMap).sort((a, b) => b[1] - a[1]).forEach(([w, c]) => {
                box.innerHTML += `<div class="flex justify-between bg-slate-50 p-2 rounded"><span>${w}</span><b>${c}</b></div>`;
            });
        }

        function renderWordCloud() {
            const canvas = document.getElementById("cloud-canvas");
            if (!canvas) return;
            const list = Object.entries(wordsMap);
            if (!list.length) return;
            WordCloud(canvas, {
                list: list,
                gridSize: 10,
                weightFactor: 30,
                fontFamily: "Noto Sans TC",
                color: function() {
                    let c = palettes[currentTheme].colors;
                    return c[Math.floor(Math.random() * c.length)];
                },
                backgroundColor: palettes[currentTheme].bg,
                rotateRatio: .3
            });
        }

        function showToast(msg) {
            const t = document.getElementById("toast-message");
            document.getElementById("toast-text").innerText = msg;
            t.classList.remove("opacity-0", "translate-y-20");
            setTimeout(() => { t.classList.add("opacity-0", "translate-y-20"); }, 2500);
        }
    </script>
</body>
</html>
