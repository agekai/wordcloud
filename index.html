<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval';">
    <title>互動即時文字雲 (P2P 安全持久版)</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- WordCloud2.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <!-- QRCode.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; overflow-x: hidden; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .canvas-container { position: relative; width: 100%; height: 520px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        #particle-canvas, #user-particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #cloud-canvas { position: relative; z-index: 2; }
        .interactive-card { box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.12), 0 2px 8px -1px rgba(148, 163, 184, 0.08); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header id="host-header" class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-30 shadow-sm flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-100">
                <i class="fa-solid fa-cloud-word text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">即時互動文字雲</h1>
                <p class="text-xs text-slate-400">Security & Persistence Enhanced</p>
            </div>
        </div>
        <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-50 text-slate-500 text-sm font-medium border border-slate-100">
            <span id="status-text">安全通道初始化中...</span>
        </div>
    </header>

    <main id="host-layout" class="hidden flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl interactive-card border border-slate-100">
                <input type="text" id="topic-input" value="今天的心情如何？用三個詞形容！" class="w-full text-lg font-bold text-slate-800 border-b-2 border-slate-100 focus:border-indigo-500 outline-none pb-1 transition-all bg-transparent">
            </div>
            <div class="bg-white p-6 rounded-2xl interactive-card border border-slate-100 flex flex-col items-center">
                <div id="qrcode" class="w-[180px] h-[180px] flex items-center justify-center text-slate-400 border border-slate-100 rounded-2xl"></div>
                <div class="mt-4 w-full flex items-center gap-1 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                    <input type="text" id="share-link-input" readonly class="bg-transparent text-xs text-slate-500 px-2 flex-1 truncate">
                    <button id="copy-link-btn" class="bg-white text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm">複製</button>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl interactive-card border border-slate-100 flex-1">
                <div class="flex items-center justify-between mb-3"><h3 class="font-bold text-sm">即時詞彙</h3><button id="clear-all-btn" class="text-xs text-rose-500">清空</button></div>
                <div id="words-list-container" class="max-h-[220px] overflow-y-auto space-y-2"></div>
            </div>
        </section>

        <section class="lg:col-span-7 flex flex-col gap-6">
            <div class="bg-white p-4 rounded-2xl interactive-card flex-1 relative min-h-[400px]">
                <canvas id="particle-canvas"></canvas>
                <canvas id="cloud-canvas" class="w-full h-full"></canvas>
            </div>
            <div class="flex gap-3">
                <button id="lock-btn" class="flex-1 bg-slate-800 text-white font-medium py-3 rounded-xl">鎖定收集</button>
                <button id="download-btn" class="flex-1 bg-slate-200 text-slate-400 font-medium py-3 rounded-xl">下載 PNG</button>
            </div>
        </section>
    </main>

    <main id="user-layout" class="hidden flex-1 max-w-md w-full mx-auto p-4 flex flex-col justify-center">
        <div id="user-card-container" class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <h2 id="user-topic" class="text-xl font-bold mb-4">連線大螢幕中...</h2>
            <textarea id="user-answer-input" rows="3" class="w-full px-4 py-3 border border-slate-200 rounded-2xl mb-4" placeholder="輸入詞彙..."></textarea>
            <button id="user-submit-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl">送出答案</button>
        </div>
    </main>

    <script>
        // --- Security & State ---
        function escapeHtml(str) { return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s])); }
        let wordsMap = JSON.parse(localStorage.getItem('wordcloud_words') || '{}');
        let topic = localStorage.getItem('wordcloud_topic') || '今天的心情如何？';

        function persistState() {
            localStorage.setItem('wordcloud_words', JSON.stringify(wordsMap));
            localStorage.setItem('wordcloud_topic', topic);
        }

        // --- Core P2P Logic ---
        let peerInstance = new Peer(); // 注意：若連線失敗，請嘗試使用自建 PeerJS Server
        
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('view') === 'input') {
                document.getElementById('user-layout').classList.remove('hidden');
                initClient(params.get('room'));
            } else {
                document.getElementById('host-layout').classList.remove('hidden');
                initHost();
            }
        };

        function initHost() {
            peerInstance.on('open', (id) => {
                const url = `${window.location.origin}${window.location.pathname}?view=input&room=${id}`;
                document.getElementById('share-link-input').value = url;
                new QRCode(document.getElementById('qrcode'), url);
                renderWordCloud();
            });
            // Handle connections, data sync...
        }

        function initClient(roomId) {
            if(!roomId) return;
            const conn = peerInstance.connect(roomId);
            conn.on('open', () => console.log("Connected to Host"));
            conn.on('data', (data) => {
                if(data.type === 'sync') {
                    topic = data.topic;
                    document.getElementById('user-topic').innerText = topic;
                }
            });
            document.getElementById('user-submit-btn').onclick = () => {
                const text = document.getElementById('user-answer-input').value;
                conn.send({ type: 'submit', words: [text] });
            };
        }

        // Render functions (simplified)
        function renderWordCloud() {
            const list = Object.entries(wordsMap);
            WordCloud(document.getElementById('cloud-canvas'), { list: list.length ? list : [['無資料', 10]] });
        }
    </script>
</body>
</html>
