<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動即時文字雲 (Firebase 即時同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD1rqdwZ0VBMDfMEiP_CBP7VUchOcbB5zo",
            authDomain: "wordcloud-live-1437f.firebaseapp.com",
            databaseURL: "https://wordcloud-live-1437f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wordcloud-live-1437f",
            storageBucket: "wordcloud-live-1437f.firebasestorage.app",
            messagingSenderId: "562249657393",
            appId: "1:562249657393:web:a5534786a9e3f23b7c3910"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.firebaseDB = db;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebasePush = push;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseRemove = remove;
        window.firebaseGet = get;
    </script>
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .canvas-container { position: relative; width: 100%; height: 520px; }
        #cloud-canvas { width: 100%; height: 100%; }
        .interactive-card { box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.12); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- Header (僅主辦版顯示) -->
    <header id="host-header" class="bg-white border-b border-slate-100 py-4 px-6 flex justify-between items-center shadow-sm">
        <h1 class="font-bold text-xl text-indigo-600">即時互動文字雲</h1>
        <div id="status-badge" class="px-3 py-1 rounded-full bg-slate-50 text-sm font-medium">連線中...</div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- 控制區 -->
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl interactive-card">
                <input type="text" id="topic-input" class="w-full text-lg font-bold border-b-2 outline-none pb-1" placeholder="輸入題目...">
                <div id="qrcode" class="mt-4 flex justify-center"></div>
                <input type="text" id="share-link-input" readonly class="w-full mt-4 p-2 text-xs bg-slate-50 border rounded text-slate-500">
            </div>
            <button id="clear-all-btn" class="text-rose-500 hover:text-rose-700">清空所有</button>
            <button id="load-sample-btn" class="text-indigo-600 border rounded p-2">載入測試範例</button>
        </section>

        <!-- 展示區 -->
        <section class="lg:col-span-7">
            <div class="bg-white p-4 rounded-2xl interactive-card h-[500px] flex flex-col">
                <h2 id="live-topic-title" class="text-2xl font-bold mb-4">等待題目...</h2>
                <div id="canvas-container" class="flex-1 bg-slate-50 rounded-xl relative">
                    <canvas id="cloud-canvas"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        let firebaseRoomId, wordsMap = {};
        
        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
        }

        function showToast(msg) { alert(msg); }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const roomId = params.get('room');
            
            if (params.get('view') === 'input' && roomId) {
                // 手機輸入端邏輯 (略，專注於主辦端)
            } else {
                initHost();
            }
        };

        function initHost() {
            firebaseRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const roomRef = firebaseRef(firebaseDB, `rooms/${firebaseRoomId}`);
            
            firebaseSet(roomRef, { topic: "今天的心情如何？", answers: {} });
            
            const inviteUrl = `${window.location.origin}${window.location.pathname}?view=input&room=${firebaseRoomId}`;
            document.getElementById("share-link-input").value = inviteUrl;
            new QRCode(document.getElementById("qrcode"), inviteUrl);

            // 監聽答案
            firebaseOnValue(firebaseRef(firebaseDB, `rooms/${firebaseRoomId}/answers`), (snapshot) => {
                wordsMap = {};
                snapshot.forEach(child => {
                    const word = child.val().word;
                    wordsMap[word] = (wordsMap[word] || 0) + 1;
                });
                renderCloud();
            });
        }

        function renderCloud() {
            const list = Object.entries(wordsMap);
            if (list.length === 0) return;
            
            WordCloud(document.getElementById('cloud-canvas'), {
                list: list,
                gridSize: 8,
                weightFactor: 20,
                color: 'random-dark'
            });
        }

        document.getElementById('clear-all-btn').onclick = () => {
            if(confirm("確定清空？")) {
                firebaseRemove(firebaseRef(firebaseDB, `rooms/${firebaseRoomId}/answers`));
                wordsMap = {};
                renderCloud();
            }
        };

        document.getElementById('load-sample-btn').onclick = () => {
            const ref = firebaseRef(firebaseDB, `rooms/${firebaseRoomId}/answers`);
            const samples = ["開心", "快樂", "興奮", "開心", "期待"];
            samples.forEach(word => firebasePush(ref, { word, time: Date.now() }));
        };

        document.getElementById('topic-input').oninput = (e) => {
            const val = e.target.value;
            document.getElementById('live-topic-title').innerText = val;
            firebaseUpdate(firebaseRef(firebaseDB, `rooms/${firebaseRoomId}`), { topic: val });
        };
    </script>
</body>
</html>
