<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動即時文字雲 Firebase Realtime Database版</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- WordCloud -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>

    <!-- QRCode -->
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>

    <!-- ===========================
         Firebase SDK
    =========================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // 填入你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "請填入",
            authDomain: "請填入",
            databaseURL: "請填入",
            projectId: "請填入",
            storageBucket: "請填入",
            messagingSenderId: "請填入",
            appId: "請填入"
        };

        const app = initializeApp(firebaseConfig);
        window.firebaseDB = getDatabase(app);
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebasePush = push;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseReady = true;

        console.log("Firebase Ready");
    </script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: #f8fafc;
        }

        .canvas-container {
            height: 520px;
            position: relative;
        }

        #cloud-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #particle-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,.05);
        }
    </style>
</head>

<body class="min-h-screen text-slate-800">

    <!-- ===============================
         HEADER
    ================================ -->
    <header id="host-header" class="bg-white border-b p-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-3 rounded-xl">
                <i class="fa-solid fa-cloud"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl text-indigo-600">
                    即時互動文字雲
                    <span class="text-xs bg-indigo-100 px-2 rounded">Firebase版</span>
                </h1>
                <p class="text-xs text-slate-400">Realtime Database Sync</p>
            </div>
        </div>
        <div id="status-badge" class="px-4 py-2 rounded-full bg-slate-100 text-sm">
            <span id="status-text">初始化 Firebase...</span>
        </div>
    </header>

    <!-- =================================
         HOST VIEW
    ================================= -->
    <main id="host-layout" class="hidden max-w-7xl mx-auto p-6 grid grid-cols-12 gap-6">
        
        <!-- 左側 -->
        <section class="col-span-5 space-y-5">
            <!-- 討論題目 -->
            <div class="card p-5">
                <label class="font-bold text-sm">
                    <i class="fa-solid fa-heading"></i> 討論題目
                </label>
                <input id="topic-input" class="mt-3 w-full border-b p-2 outline-none font-bold text-lg" value="今天的心情如何？用三個詞形容！">
            </div>

            <!-- QR Code -->
            <div class="card p-6 text-center">
                <h3 class="font-bold mb-3">
                    <i class="fa-solid fa-qrcode"></i> 加入活動
                </h3>
                <div id="qrcode" class="mx-auto w-[180px] h-[180px]"></div>
                <input id="share-link-input" readonly class="mt-4 w-full bg-slate-100 p-2 rounded text-xs">
                <button id="copy-link-btn" class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded-lg">複製連結</button>
            </div>

            <!-- WORD LIST -->
            <div class="card p-5">
                <div class="flex justify-between">
                    <h3 class="font-bold">詞彙列表</h3>
                    <button id="clear-all-btn" class="text-red-500 text-sm">清空</button>
                </div>
                <div id="words-list-container" class="mt-4 space-y-2 max-h-60 overflow-auto"></div>
            </div>
        </section>

        <!-- 右側 -->
        <section class="col-span-7 space-y-5">
            <div class="card p-5">
                <span class="bg-indigo-600 text-white px-3 py-1 rounded text-xs">LIVE</span>
                <h2 id="live-topic-title" class="mt-3 text-xl font-bold">等待同步</h2>
            </div>

            <div class="card p-5">
                <div class="mb-3 flex gap-2">
                    <button data-theme="modern" class="theme-btn">莫蘭迪</button>
                    <button data-theme="fireshow" class="theme-btn">🔥 火舞</button>
                </div>

                <div id="canvas-container" class="canvas-container bg-slate-100 rounded-xl">
                    <canvas id="particle-canvas"></canvas>
                    <canvas id="cloud-canvas"></canvas>
                </div>

                <div class="mt-5 flex gap-3">
                    <button id="lock-btn" class="flex-1 bg-slate-800 text-white p-3 rounded-xl">鎖定收集</button>
                    <button id="download-btn" disabled class="flex-1 bg-slate-200 p-3 rounded-xl">下載 PNG</button>
                </div>
            </div>
        </section>
    </main>

    <!-- =================================
         USER VIEW
    ================================= -->
    <main id="user-layout" class="hidden max-w-md mx-auto p-5 min-h-screen flex items-center">
        <div id="user-card-container" class="card p-6 w-full space-y-5">
            <div id="user-status-badge" class="bg-indigo-100 text-indigo-600 rounded-full px-3 py-2 text-sm">
                連線中...
            </div>
            
            <h2 id="user-topic" class="font-bold text-xl">等待題目</h2>
            
            <textarea id="user-answer-input" rows="4" class="w-full border rounded-xl p-3" placeholder="輸入你的想法"></textarea>
            
            <button id="user-submit-btn" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">送出答案</button>
            
            <div id="user-success-overlay" class="hidden">已送出！</div>
        </div>
    </main>

    <!-- =================================
         Toast 提示
    ================================= -->
    <div id="toast-message" class="fixed bottom-5 right-5 bg-black text-white px-5 py-3 rounded-xl opacity-0 transition-opacity duration-300">
        <span id="toast-text"></span>
    </div>
    <script>
    <!-- 第2/3、第3/3 JavaScript 會接續放這裡 -->
        // =====================================
        // Firebase Realtime Database 版核心
        // 取代 PeerJS
        // =====================================
        
        let viewRole = "host";
        let roomId = null;
        let topic = "今天的心情如何？用三個詞形容！";
        let currentTheme = "modern";
        let isLocked = false;
        let wordsMap = {};
        let roomRef = null;
        
        // =====================================
        // 頁面初始化
        // =====================================
        window.addEventListener("load", () => {
            const params = new URLSearchParams(location.search);
            const view = params.get("view");
            const room = params.get("room");
        
            if (view === "input" && room) {
                viewRole = "input";
                roomId = room;
        
                document.getElementById("user-layout").classList.remove("hidden");
                document.getElementById("host-header").style.display = "none";
                document.getElementById("host-layout").classList.add("hidden");
        
                initClientFirebase();
            } else {
                viewRole = "host";
                document.getElementById("host-layout").classList.remove("hidden");
                initHostFirebase();
            }
        });
        
        // =====================================
        // HOST 建立活動房間
        // =====================================
        function initHostFirebase() {
            roomId = crypto.randomUUID().substring(0, 8);
            roomRef = firebaseRef(firebaseDB, "rooms/" + roomId);
        
            // 建立 Firebase 房間資料
            firebaseSet(roomRef, {
                topic: topic,
                theme: currentTheme,
                locked: false,
                words: {},
                created: Date.now()
            });
        
            // 產生加入網址
            const url = location.origin + location.pathname + "?view=input&room=" + roomId;
            document.getElementById("share-link-input").value = url;
        
            // QR Code
            const qr = document.getElementById("qrcode");
            qr.innerHTML = "";
            new QRCode(qr, {
                text: url,
                width: 180,
                height: 180
            });
        
            document.getElementById("status-text").innerText = "活動房間：" + roomId;
            document.getElementById("status-badge").className = "px-4 py-2 rounded-full bg-emerald-100 text-emerald-700";
        
            listenHostDatabase();
            setupHostEvents();
        }
        
        // =====================================
        // HOST 即時監聽資料
        // =====================================
        function listenHostDatabase() {
            firebaseOnValue(firebaseRef(firebaseDB, "rooms/" + roomId), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
        
                topic = data.topic || topic;
                currentTheme = data.theme || "modern";
                isLocked = data.locked || false;
                wordsMap = data.words || {};
        
                updateHostUI();
                renderWordsList();
                renderWordCloud();
            });
        }
        
        // =====================================
        // USER 加入活動
        // =====================================
        function initClientFirebase() {
            roomRef = firebaseRef(firebaseDB, "rooms/" + roomId);
        
            // 監聽主辦同步
            firebaseOnValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    showToast("找不到活動房間", "error");
                    return;
                }
        
                topic = data.topic;
                currentTheme = data.theme;
                isLocked = data.locked;
        
                document.getElementById("user-topic").innerText = topic;
                document.getElementById("user-submit-btn").disabled = isLocked;
            });
        
            document.getElementById("user-status-badge").innerHTML = `
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full"></span>
                已連線活動
            `;
        
            setupUserEvents();
        }
        
        // =====================================
        // USER 發送答案
        // =====================================
        function sendAnswerToHost(words) {
            if (isLocked) return false;
        
            words.forEach(word => {
                let clean = escapeHtml(word.trim().substring(0, 15));
                if (!clean) return;
        
                const wordPath = "rooms/" + roomId + "/words/" + clean;
        
                firebaseOnValue(firebaseRef(firebaseDB, wordPath), (snapshot) => {
                    let count = snapshot.val() || 0;
                    firebaseSet(firebaseRef(firebaseDB, wordPath), count + 1);
                }, { onlyOnce: true });
            });
        
            return true;
        }
        
        // =====================================
        // HOST 更新設定
        // =====================================
        function broadcastConfig() {
            firebaseUpdate(roomRef, {
                topic: topic,
                theme: currentTheme,
                locked: isLocked
            });
        }
        
        // =====================================
        // HOST UI事件
        // =====================================
        function setupHostEvents() {
            // 複製連結
            document.getElementById("copy-link-btn").onclick = () => {
                const input = document.getElementById("share-link-input");
                input.select();
                navigator.clipboard.writeText(input.value);
                showToast("連結已複製");
            };
        
            // 題目修改
            document.getElementById("topic-input").oninput = (e) => {
                topic = e.target.value;
                broadcastConfig();
            };
        
            // 鎖定
            document.getElementById("lock-btn").onclick = () => {
                isLocked = !isLocked;
                broadcastConfig();
            };
        
            // 清空
            document.getElementById("clear-all-btn").onclick = () => {
                wordsMap = {};
                firebaseSet(firebaseRef(firebaseDB, "rooms/" + roomId + "/words"), null);
            };
        }
        
        // =====================================
        // USER事件
        // =====================================
        function setupUserEvents() {
            document.getElementById("user-submit-btn").onclick = () => {
                const input = document.getElementById("user-answer-input");
                const text = input.value.trim();
        
                if (!text) {
                    showToast("請輸入文字");
                    return;
                }
        
                const words = text.split(/[\s,，、\n]+/).filter(x => x);
                sendAnswerToHost(words);
                input.value = "";
                showToast("答案已送出");
            };
        }
        
        // =====================================
        // HTML安全過濾
        // =====================================
        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, s => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[s]));
        }
        
        // =====================================
        // HOST UI更新
        // =====================================
        function updateHostUI() {
            document.getElementById("live-topic-title").innerText = topic;
            document.getElementById("lock-btn").innerText = isLocked ? "開啟收集" : "鎖定收集";
        }

        // =====================================
        // 文字雲繪製 WordCloud2
        // =====================================
        function renderWordCloud() {
            const canvas = document.getElementById("cloud-canvas");
            const container = document.getElementById("canvas-container");
        
            if (!canvas || !container) return;
        
            const list = Object.entries(wordsMap);
            const rect = container.getBoundingClientRect();
        
            canvas.width = rect.width;
            canvas.height = rect.height;
        
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        
            if (list.length === 0) return;
        
            const palettes = {
                modern: ["#6366f1", "#8b5cf6", "#ec4899", "#06b6d4", "#14b8a6"],
                fireshow: ["#ff4500", "#ff8c00", "#ffd700", "#ff3333"]
            };
        
            WordCloud(canvas, {
                list: list,
                gridSize: 12,
                weightFactor: Math.max(10, canvas.width / 500),
                fontFamily: "Noto Sans TC, sans-serif",
                fontWeight: "700",
                color: () => {
                    const colors = palettes[currentTheme] || palettes.modern;
                    return colors[Math.floor(Math.random() * colors.length)];
                },
                backgroundColor: currentTheme === "fireshow" ? "#140502" : "#f8fafc",
                rotateRatio: 0.3,
                shuffle: true,
                drawOutOfBound: false,
                ellipticity: 0.8
            });
        }
        
        // =====================================
        // 詞彙列表
        // =====================================
        function renderWordsList() {
            const box = document.getElementById("words-list-container");
            if (!box) return;
        
            const data = Object.entries(wordsMap).sort((a, b) => b[1] - a[1]);
        
            if (data.length === 0) {
                box.innerHTML = `<div class="text-center text-slate-400">等待觀眾輸入...</div>`;
                return;
            }
        
            box.innerHTML = "";
            data.forEach(([word, count]) => {
                const row = document.createElement("div");
                row.className = "flex justify-between items-center bg-slate-50 rounded-lg p-2";
                row.innerHTML = `
                    <span class="font-bold">${word}</span>
                    <span class="text-indigo-600">${count}</span>
                `;
                box.appendChild(row);
            });
        }
        
        // =====================================
        // 主題切換
        // =====================================
        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.onclick = () => {
                currentTheme = btn.dataset.theme;
                broadcastConfig();
                renderWordCloud();
            };
        });
        
        // =====================================
        // PNG下載
        // =====================================
        document.getElementById("download-btn").onclick = () => {
            const canvas = document.getElementById("cloud-canvas");
            const link = document.createElement("a");
            link.download = "interactive-wordcloud.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            showToast("PNG下載完成");
        };
        
        // =====================================
        // 鎖定後開啟下載
        // =====================================
        setInterval(() => {
            const btn = document.getElementById("download-btn");
            if (!btn) return;
        
            if (isLocked) {
                btn.disabled = false;
                btn.className = "flex-1 bg-emerald-500 text-white p-3 rounded-xl";
            } else {
                btn.disabled = true;
                btn.className = "flex-1 bg-slate-200 p-3 rounded-xl";
            }
        }, 500);
        
        // =====================================
        // 火舞粒子效果
        // =====================================
        let fireParticles = [];
        let fireAnimation = null;
        
        function startFireEffect() {
            const canvas = document.getElementById("particle-canvas");
            if (!canvas) return;
        
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        
            fireParticles = [];
            for (let i = 0; i < 50; i++) {
                fireParticles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + Math.random() * 200,
                    r: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 0.5
                });
            }
        
            function animate() {
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fireParticles.forEach(p => {
                    p.y -= p.speed;
                    if (p.y < 0) p.y = canvas.height;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "#ff9800";
                    ctx.fill();
                });
                fireAnimation = requestAnimationFrame(animate);
            }
            animate();
        }
        
        function stopFireEffect() {
            if (fireAnimation) cancelAnimationFrame(fireAnimation);
            const canvas = document.getElementById("particle-canvas");
            if (canvas) canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // 監控主題切換
        setInterval(() => {
            if (currentTheme === "fireshow") {
                startFireEffect();
            } else {
                stopFireEffect();
            }
        }, 2000);
        
        // =====================================
        // Toast 提示
        // =====================================
        function showToast(message, type = "success") {
            const box = document.getElementById("toast-message");
            const text = document.getElementById("toast-text");
            if (!box) return;
        
            text.innerText = message;
            box.classList.remove("opacity-0");
            setTimeout(() => {
                box.classList.add("opacity-0");
            }, 2500);
        }
        
        // =====================================
        // 畫面縮放重新繪製
        // =====================================
        window.addEventListener("resize", () => {
            renderWordCloud();
        });
    </script>
</body>
</html>
