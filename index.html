<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動即時文字雲 Firebase Realtime Database 完整版</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>

    <!-- Firebase SDK & Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1rqdwZ0VBMDfMEiP_CBP7VUchOcbB5zo",
            authDomain: "wordcloud-live-1437f.firebaseapp.com",
            databaseURL: "https://wordcloud-live-1437f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wordcloud-live-1437f",
            storageBucket: "wordcloud-live-1437f.firebasestorage.app",
            messagingSenderId: "562249657393",
            appId: "1:562249657393:web:a5534786a9e3f23b7c3910"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 暴露給全域使用
        window.firebaseDB = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseUpdate = update;
        window.firebaseOnValue = onValue;
        window.firebasePush = push;
        window.firebaseRunTransaction = runTransaction;
        window.firebaseReady = true;

        window.dispatchEvent(new Event("firebase-ready"));
        console.log("Firebase Realtime Database Ready");
    </script>

    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #f8fafc; overflow-x: hidden; }
        
        /* Canvas 容器 */
        .canvas-container { position: relative; width: 100%; height: 520px; }
        #cloud-canvas, #particle-canvas { position: absolute; width: 100%; height: 100%; }
        #cloud-canvas { z-index: 2; }
        #particle-canvas { pointer-events: none; z-index: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        /* Card */
        .interactive-card { box-shadow: 0 4px 20px -2px rgba(148,163,184,.12), 0 2px 8px -1px rgba(148,163,184,.08); }
        .fireshow-bg { background: #140502; color: white; }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header id="host-header" class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-30 shadow-sm flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-3 rounded-xl shadow-lg">
                <i class="fa-solid fa-cloud text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                    即時互動文字雲
                    <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">Firebase版</span>
                </h1>
                <p class="text-xs text-slate-400">Realtime Database Secured Interactive Word Cloud</p>
            </div>
        </div>

        <div id="status-badge" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 text-slate-500 text-sm border">
            <span class="w-2 h-2 rounded-full bg-slate-400 animate-pulse"></span>
            <span id="status-text">Firebase 初始化中...</span>
        </div>
    </header>
    
<body class="min-h-screen bg-slate-50 text-slate-800">

    <!-- ===============================
         HEADER
    ================================ -->
    <header id="host-header" class="bg-white border-b shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-3 rounded-xl">
                <i class="fa-solid fa-cloud text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl text-indigo-600">
                    即時互動文字雲
                    <span class="text-xs bg-indigo-100 px-2 py-1 rounded">Firebase版</span>
                </h1>
                <p class="text-xs text-slate-400">Realtime Database Live Sync</p>
            </div>
        </div>
        <div id="status-badge" class="px-4 py-2 rounded-full bg-slate-100">
            <span id="status-text">初始化 Firebase...</span>
        </div>
    </header>

    <!-- =================================
         HOST 主控端
    ================================= -->
    <main id="host-layout" class="hidden max-w-7xl mx-auto p-6 grid grid-cols-12 gap-6">
        
        <!-- LEFT PANEL -->
        <section class="col-span-12 lg:col-span-5 space-y-5">
            <!-- Topic -->
            <div class="card bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <label class="font-bold block mb-2"><i class="fa-solid fa-heading"></i> 討論題目</label>
                <input id="topic-input" class="w-full border-b outline-none p-2 text-lg font-bold" value="今天的心情如何？用三個詞形容！">
            </div>

            <!-- QR -->
            <div class="card bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center">
                <h3 class="font-bold mb-4"><i class="fa-solid fa-qrcode"></i> 加入活動</h3>
                <div id="qrcode" class="mx-auto w-[180px] h-[180px]"></div>
                <input id="share-link-input" readonly class="mt-4 w-full bg-slate-100 rounded p-2 text-xs text-center">
                <button id="copy-link-btn" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg w-full">複製加入連結</button>
            </div>

            <!-- WORD LIST -->
            <div class="card bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold"><i class="fa-solid fa-list"></i> 詞彙列表</h3>
                    <button id="clear-all-btn" class="text-red-500 text-sm">清空</button>
                </div>
                <div id="words-list-container" class="mt-4 space-y-2 max-h-72 overflow-auto"></div>
            </div>
        </section>

        <!-- RIGHT PANEL -->
        <section class="col-span-12 lg:col-span-7 space-y-5">
            <div class="card bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <span class="bg-indigo-600 text-white px-3 py-1 rounded-full text-xs">LIVE</span>
                <h2 id="live-topic-title" class="mt-3 font-bold text-2xl">等待同步</h2>
            </div>

            <div class="card bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <div class="flex gap-3 mb-4">
                    <button data-theme="modern" class="theme-btn px-4 py-2 rounded-lg bg-indigo-100">莫蘭迪</button>
                    <button data-theme="fireshow" class="theme-btn px-4 py-2 rounded-lg bg-orange-100">🔥 火舞</button>
                </div>
                <div id="canvas-container" class="canvas-container bg-slate-100 rounded-xl overflow-hidden relative h-[400px]">
                    <canvas id="particle-canvas" class="absolute inset-0"></canvas>
                    <canvas id="cloud-canvas" class="absolute inset-0"></canvas>
                </div>
                <div class="mt-5 flex gap-3">
                    <button id="lock-btn" class="flex-1 bg-slate-800 text-white rounded-xl p-3">鎖定收集</button>
                    <button id="download-btn" disabled class="flex-1 bg-slate-200 rounded-xl p-3">下載 PNG</button>
                </div>
            </div>
        </section>
    </main>

    <!-- =================================
         USER INPUT VIEW
    ================================= -->
    <main id="user-layout" class="hidden min-h-screen flex items-center justify-center p-5">
        <div class="card bg-white w-full max-w-md p-6 rounded-2xl shadow-xl border border-slate-100 space-y-5">
            <div id="user-status-badge" class="bg-indigo-100 text-indigo-600 rounded-full px-4 py-2 text-sm text-center">連線中...</div>
            <h2 id="user-topic" class="text-xl font-bold text-center">等待題目</h2>
            <textarea id="user-answer-input" rows="5" placeholder="輸入你的想法，例如：開心 自由 成長" class="w-full border rounded-xl p-4 outline-none"></textarea>
            <button id="user-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl p-4 font-bold">送出答案</button>
            <div id="user-success-overlay" class="hidden text-center text-green-600 font-bold">✓ 已送出</div>
        </div>
    </main>

    <!-- ===============================
         TOAST
    ================================ -->
    <div id="toast-message" class="fixed bottom-5 right-5 bg-black text-white px-5 py-3 rounded-xl opacity-0 transition pointer-events-none">
        <span id="toast-text"></span>
    </div>

    <script type="module">
        import { ref, set, update, onValue, push, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    
        // Firebase DB 實例
        const db = window.firebaseDB;
    
        // =======================================
        // 全域狀態 (Global State)
        // =======================================
        let role = "host";
        let roomId = null;
        let roomRef = null;
        let topic = "今天的心情如何？用三個詞形容！";
        let currentTheme = "modern";
        let locked = false;
        let wordsMap = {};
    
        // =======================================
        // DOM 初始化
        // =======================================
        window.addEventListener("load", () => {
            const params = new URLSearchParams(location.search);
            const view = params.get("view");
            const room = params.get("room");
    
            if (view === "input" && room) {
                role = "user";
                roomId = room;
                document.getElementById("host-header").style.display = "none";
                document.getElementById("user-layout").classList.remove("hidden");
                initUser();
            } else {
                role = "host";
                document.getElementById("host-layout").classList.remove("hidden");
                initHost();
            }
        });
    
        // =======================================
        // HOST 初始化流程
        // =======================================
        async function initHost() {
            roomId = crypto.randomUUID().substring(0, 8);
            roomRef = ref(db, "rooms/" + roomId);
    
            await set(roomRef, {
                topic: topic,
                theme: currentTheme,
                locked: false,
                words: {},
                created: Date.now()
            });
    
            createQRCode();
            document.getElementById("status-text").innerText = "房間：" + roomId;
            document.getElementById("status-badge").className = "px-4 py-2 rounded-full bg-emerald-100 text-emerald-700";
    
            listenRoom();
            bindHostEvents();
        }
    
        // =======================================
        // 資料監聽 (Firebase Listener)
        // =======================================
        function listenRoom() {
            const r = ref(db, "rooms/" + roomId);
            onValue(r, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
    
                topic = data.topic || topic;
                currentTheme = data.theme || "modern";
                locked = data.locked || false;
                wordsMap = data.words || {};
    
                if (role === "host") {
                    updateHostUI();
                    renderWordsList(); // 需實作
                    renderWordCloud(); // 需實作
                } else {
                    document.getElementById("user-topic").innerText = topic;
                    document.getElementById("user-submit-btn").disabled = locked;
                }
            });
        }
    
        // =======================================
        // USER 邏輯
        // =======================================
        function initUser() {
            roomRef = ref(db, "rooms/" + roomId);
            listenRoom();
            document.getElementById("user-status-badge").innerHTML = `
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full"></span> 已連線活動`;
            bindUserEvents();
        }
    
        async function sendWords(words) {
            if (locked) { showToast("活動已鎖定"); return; }
    
            for (const w of words) {
                let word = w.trim().substring(0, 20);
                if (!word) continue;
    
                const wordRef = ref(db, "rooms/" + roomId + "/words/" + word);
                await runTransaction(wordRef, (current) => (current || 0) + 1);
            }
        }
    
        // =======================================
        // 事件綁定 (Event Bindings)
        // =======================================
        function bindUserEvents() {
            document.getElementById("user-submit-btn").onclick = async () => {
                const input = document.getElementById("user-answer-input");
                let text = input.value.trim();
                if (!text) { showToast("請輸入文字"); return; }
    
                const words = text.split(/[\s,，、\n]+/).filter(x => x);
                await sendWords(words);
                input.value = "";
                document.getElementById("user-success-overlay").classList.remove("hidden");
                showToast("答案送出成功");
            };
        }
    
        function bindHostEvents() {
            document.getElementById("copy-link-btn").onclick = () => {
                navigator.clipboard.writeText(document.getElementById("share-link-input").value);
                showToast("加入連結已複製");
            };
    
            document.getElementById("topic-input").oninput = (e) => {
                update(roomRef, { topic: e.target.value });
            };
    
            document.getElementById("lock-btn").onclick = () => {
                update(roomRef, { locked: !locked });
            };
    
            document.getElementById("clear-all-btn").onclick = () => {
                set(ref(db, "rooms/" + roomId + "/words"), null);
            };
        }
    
        // =======================================
        // 輔助函式
        // =======================================
        function updateHostUI() {
            document.getElementById("live-topic-title").innerText = topic;
            document.getElementById("lock-btn").innerText = locked ? "開啟收集" : "鎖定收集";
        }
    
        function createQRCode() {
            const url = location.origin + location.pathname + "?view=input&room=" + roomId;
            document.getElementById("share-link-input").value = url;
            const box = document.getElementById("qrcode");
            box.innerHTML = "";
            new QRCode(box, { text: url, width: 180, height: 180 });
        }
    
        function showToast(msg) {
            const t = document.getElementById("toast-message");
            document.getElementById("toast-text").innerText = msg;
            t.classList.remove("opacity-0");
            setTimeout(() => t.classList.add("opacity-0"), 2000);
        }
    </script>

    <script>
        // =======================================
        // WordCloud 渲染邏輯
        // =======================================
        function renderWordCloud() {
            const canvas = document.getElementById("cloud-canvas");
            const container = document.getElementById("canvas-container");
            if (!canvas || !container) return;
    
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
    
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
    
            const list = Object.entries(wordsMap);
            if (list.length === 0) return;
    
            const themes = {
                modern: ["#6366f1", "#8b5cf6", "#ec4899", "#06b6d4", "#14b8a6"],
                fireshow: ["#ff4500", "#ff8c00", "#ffd700", "#ff3333"]
            };
    
            WordCloud(canvas, {
                list: list,
                gridSize: 12,
                weightFactor: Math.max(12, canvas.width / 450),
                fontFamily: "Noto Sans TC, sans-serif",
                fontWeight: "700",
                color: () => {
                    const arr = themes[currentTheme] || themes.modern;
                    return arr[Math.floor(Math.random() * arr.length)];
                },
                backgroundColor: currentTheme === "fireshow" ? "#160500" : "#f8fafc",
                rotateRatio: 0.25,
                shuffle: true,
                drawOutOfBound: false,
                ellipticity: 0.8
            });
        }
    
        // =======================================
        // 詞彙列表渲染
        // =======================================
        function renderWordsList() {
            const box = document.getElementById("words-list-container");
            if (!box) return;
    
            let data = Object.entries(wordsMap).sort((a, b) => b[1] - a[1]);
    
            if (data.length === 0) {
                box.innerHTML = `<div class="text-center text-slate-400">等待觀眾輸入...</div>`;
                return;
            }
    
            box.innerHTML = "";
            data.forEach(([word, count]) => {
                const item = document.createElement("div");
                item.className = "flex justify-between items-center bg-slate-50 rounded-lg p-3";
                item.innerHTML = `
                    <span class="font-bold">${word}</span>
                    <span class="text-indigo-600 font-bold">${count}</span>
                `;
                box.appendChild(item);
            });
        }
    
        // =======================================
        // 互動事件綁定
        // =======================================
        // 主題切換
        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.onclick = () => {
                currentTheme = btn.dataset.theme;
                if (role === "host") {
                    update(roomRef, { theme: currentTheme });
                }
                renderWordCloud();
            };
        });
    
        // 下載功能
        document.getElementById("download-btn").onclick = () => {
            const canvas = document.getElementById("cloud-canvas");
            const link = document.createElement("a");
            link.download = "firebase-wordcloud.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            showToast("PNG下載完成");
        };
    
        // 狀態監控 (鎖定/解鎖 UI)
        setInterval(() => {
            const btn = document.getElementById("download-btn");
            if (!btn) return;
            if (locked) {
                btn.disabled = false;
                btn.className = "flex-1 bg-emerald-500 text-white rounded-xl p-3";
            } else {
                btn.disabled = true;
                btn.className = "flex-1 bg-slate-200 rounded-xl p-3";
            }
        }, 500);
    
        // =======================================
        // 特效邏輯：火舞粒子系統
        // =======================================
        let particles = [];
        let fireAnimation = null;
    
        function startFire() {
            const canvas = document.getElementById("particle-canvas");
            if (!canvas) return;
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            particles = Array.from({ length: 80 }, () => ({
                x: Math.random() * canvas.width,
                y: canvas.height + Math.random() * 200,
                r: Math.random() * 3 + 1,
                speed: Math.random() * 2 + 0.5
            }));
    
            function animate() {
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.y -= p.speed;
                    if (p.y < 0) p.y = canvas.height;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "#ff9800";
                    ctx.fill();
                });
                fireAnimation = requestAnimationFrame(animate);
            }
            animate();
        }
    
        function stopFire() {
            if (fireAnimation) cancelAnimationFrame(fireAnimation);
            const canvas = document.getElementById("particle-canvas");
            if (canvas) canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
        }
    
        setInterval(() => {
            if (currentTheme === "fireshow") startFire();
            else stopFire();
        }, 2000);
    
        // =======================================
        // 通用輔助函式
        // =======================================
        function showToast(msg) {
            const box = document.getElementById("toast-message");
            const text = document.getElementById("toast-text");
            if (!box) return;
            text.innerText = msg;
            box.classList.remove("opacity-0");
            setTimeout(() => box.classList.add("opacity-0"), 2500);
        }
    
        window.addEventListener("resize", renderWordCloud);
        window.renderWordCloud = renderWordCloud;
    </script>
</body>
</html>
