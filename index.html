<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動即時文字雲 (Firebase 雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .canvas-container { position: relative; width: 100%; height: 520px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #cloud-canvas { position: relative; z-index: 2; }
        .interactive-card { box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.12); }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header id="host-header" class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-30 shadow-sm flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-2.5 rounded-xl shadow-lg flex items-center justify-center">
                <i class="fa-solid fa-cloud-word text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">即時互動文字雲 <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-semibold">Firebase 版</span></h1>
            </div>
        </div>
        <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-50 text-slate-500 text-sm font-medium border border-slate-100">
            <span id="status-text">初始化中...</span>
        </div>
    </header>

    <main id="host-layout" class="hidden flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <section class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-2xl interactive-card border border-slate-100">
                <label class="text-sm font-semibold text-slate-500 mb-2 block">設定現場討論題目</label>
                <input type="text" id="topic-input" class="w-full text-lg font-bold text-slate-800 border-b-2 border-slate-100 focus:border-indigo-500 outline-none pb-1 bg-transparent">
            </div>
            <div class="bg-white p-6 rounded-2xl interactive-card border border-slate-100 flex flex-col items-center">
                <div id="qrcode" class="w-[180px] h-[180px] flex items-center justify-center border border-slate-100 rounded-2xl mb-4"></div>
                <div class="w-full flex items-center gap-1 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                    <input type="text" id="share-link-input" readonly class="bg-transparent text-xs text-slate-500 outline-none px-2 flex-1 truncate">
                    <button id="copy-link-btn" class="bg-white hover:bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm transition">複製</button>
                </div>
            </div>
        </section>
        <section class="lg:col-span-7 flex flex-col gap-6">
            <div class="bg-white p-4 rounded-2xl interactive-card border border-slate-100 flex-1 flex flex-col relative">
                <div id="canvas-container" class="canvas-container flex-1 bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center">
                    <canvas id="cloud-canvas" class="w-full h-full"></canvas>
                </div>
                <button id="lock-btn" class="mt-4 w-full bg-slate-800 text-white font-medium py-3 rounded-xl transition">切換收集狀態</button>
            </div>
        </section>
    </main>

    <main id="user-layout" class="hidden flex-1 max-w-md w-full mx-auto p-4 flex flex-col justify-center">
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 flex flex-col gap-6">
            <h2 id="user-topic" class="text-xl font-bold text-slate-800">載入中...</h2>
            <textarea id="user-answer-input" rows="4" class="w-full px-4 py-3 border border-slate-200 rounded-2xl outline-none shadow-inner" placeholder="輸入詞彙..."></textarea>
            <button id="user-submit-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">送出答案</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, increment, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Provided by system environment)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State variables
        let roomId = new URLSearchParams(window.location.search).get('room') || crypto.randomUUID();
        let isHost = !new URLSearchParams(window.location.search).has('view');
        let wordsMap = {};
        let topic = "今天的心情如何？";
        let isLocked = false;

        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);

        // App Init
        if (isHost) {
            document.getElementById('host-layout').classList.remove('hidden');
            const inviteUrl = `${window.location.origin}${window.location.pathname}?view=input&room=${roomId}`;
            document.getElementById('share-link-input').value = inviteUrl;
            new QRCode(document.getElementById('qrcode'), inviteUrl);
            
            // Initialize room if new
            getDoc(docRef).then(snap => {
                if(!snap.exists()) setDoc(docRef, { topic, isLocked, words: {} });
            });
            
            document.getElementById('topic-input').addEventListener('change', (e) => updateDoc(docRef, { topic: e.target.value }));
            document.getElementById('lock-btn').addEventListener('click', () => updateDoc(docRef, { isLocked: !isLocked }));
        } else {
            document.getElementById('user-layout').classList.remove('hidden');
            document.getElementById('user-submit-btn').addEventListener('click', async () => {
                const val = document.getElementById('user-answer-input').value.trim();
                if(!val) return;
                // Atomic increment in Firestore
                await updateDoc(docRef, { [`words.${val}`]: increment(1) });
                document.getElementById('user-answer-input').value = '';
            });
        }

        // Real-time synchronization
        onSnapshot(docRef, (snap) => {
            if(!snap.exists()) return;
            const data = snap.data();
            wordsMap = data.words || {};
            topic = data.topic;
            isLocked = data.isLocked;

            // UI Updates
            if(isHost) {
                document.getElementById('topic-input').value = topic;
                document.getElementById('status-text').innerText = isLocked ? "收集已關閉" : "同步中";
                renderCloud();
            } else {
                document.getElementById('user-topic').innerText = topic;
                if(isLocked) document.getElementById('user-submit-btn').innerText = "已鎖定";
                document.getElementById('user-submit-btn').disabled = isLocked;
            }
        });

        function renderCloud() {
            const list = Object.entries(wordsMap);
            if(list.length === 0) return;
            WordCloud(document.getElementById('cloud-canvas'), { list: list, weightFactor: 10, fontFamily: 'Inter' });
        }
    </script>
</body>
</html>
